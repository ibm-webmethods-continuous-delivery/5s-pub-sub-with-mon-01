apiVersion: 1

groups:
- name: um-durable-alerts
  orgId: 1
  folder: UM Alerts
  interval: 1m
  rules:
  - uid: um-outstanding-events-warning
    title: UM Outstanding Events Warning
    condition: C
    data:
    - refId: A
      queryType: ''
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: PBFA97CFB590B2093
      model:
        expr: sag_um_topic_durable_outstanding
        intervalMs: 1000
        maxDataPoints: 43200
        refId: A
    - refId: B
      queryType: ''
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        datasource:
          type: __expr__
          uid: __expr__
        expression: A
        reducer: last
        type: reduce
        refId: B
    - refId: C
      queryType: ''
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        datasource:
          type: __expr__
          uid: __expr__
        expression: $B >= 2000
        type: math
        refId: C
    noDataState: NoData
    execErrState: Alerting
    for: 2m
    annotations:
      summary: "UM Outstanding Events Warning"
      description: "The number of outstanding events is {{ printf \"%.0f\" $values.B.Value }}, which exceeds the warning threshold of 2000. Durable: {{ $values.B.Labels.durable_name }}"
    labels:
      severity: warning
      component: universal-messaging
      metric_type: outstanding_events

  - uid: um-outstanding-events-critical
