server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log
  - job_name: msr_pub_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: msr_pub_logs
          __path__: /logs/msr_pub_logs/*
  - job_name: msr_sub_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: msr_sub_logs
          __path__: /logs/msr_sub_logs/*
  - job_name: um_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: um_logs
          __path__: /logs/um_logs/*
